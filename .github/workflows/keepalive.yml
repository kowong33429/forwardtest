name: Keep Alive Ping

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API to prevent spindown
        run: |
          # Replace the URL below with your actual deployed backend URL!
          # Example: https://forwardtest-backend.onrender.com/api/ping
          curl -s -o /dev/null -w "%{http_code}" https://forwardtest-u7qc.onrender.com/api/ping
